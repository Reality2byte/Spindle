name: Build & Push Slurm Base Image
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Slurm Base Image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./containers/spindle-slurm-ubuntu/base
          platforms: linux/amd64
          push: true
          tags: ghcr.io/llnl/spindle-slurm-base:latest
          cache-from: type=registry,ref=ghcr.io/llnl/spindle-slurm-base:buildcache
          cache-to: type=registry,ref=ghcr.io/llnl/spindle-slurm-base:buildcache,mode=max
