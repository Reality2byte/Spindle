name: Build & Push Slurm Base Image
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Slurm Base Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ./containers/spindle-slurm-ubuntu/base
          platforms: linux/amd64
          push: true
          tags: ghcr.io/llnl/spindle-slurm-base:latest
          cache-from: type=registry,ref=ghcr.io/llnl/spindle-slurm-base:buildcache
          cache-to: type=registry,ref=ghcr.io/llnl/spindle-slurm-base:buildcache,mode=max
