name: Build & Push Slurm Base Image
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Slurm Base Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ./containers/spindle-slurm-ubuntu/base
          platforms: linux/amd64
          push: true
          tags: ghcr.io/llnl/spindle-slurm-base:latest
          cache-from: type=registry,ref=ghcr.io/llnl/spindle-slurm-base:buildcache
          cache-to: type=registry,ref=ghcr.io/llnl/spindle-slurm-base:buildcache,mode=max
